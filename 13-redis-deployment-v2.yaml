# 13-redis-deployment-v2.yaml
# Purpose: Update Redis to use PVC instead of emptyDir
# This replaces the Day 2 redis-deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: voting-system
  labels:
    app: redis
    tier: backend
    version: "2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: backend
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          command: ["sh", "-c"]
          args:
            - |
              exec redis-server \
                --requirepass "${REDIS_PASSWORD}" \
                --appendonly yes \
                --save "30 1" \
                --dir /data
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-persistent-storage
              mountPath: /data               # Redis writes here — NOW PERSISTENT
      volumes:
        - name: redis-persistent-storage
          persistentVolumeClaim:
            claimName: redis-pvc            # Bind to our PVC
      # No nodeSelector needed — Docker Desktop is single-node
